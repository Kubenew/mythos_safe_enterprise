version: '3.9'

services:
  # Traefik Reverse Proxy + SSL
  traefik:
    image: traefik:v3.0
    container_name: mythos-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/data
      - ./traefik.yml:/traefik.yml:ro
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=your-email@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--api.dashboard=true"
      - "--log.level=INFO"

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: mythos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: mythos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s

  # FastAPI Backend
  api:
    build: ./backend
    container_name: mythos-api
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.yourdomain.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  worker:
    build: ./worker
    container_name: mythos-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
      - redis
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=6

  # Flower (Celery Dashboard)
  flower:
    build: ./worker
    container_name: mythos-flower
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.yourdomain.com`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"

  # Secure Cyber Sandbox with gVisor
  cyber-sandbox:
    build:
      context: ./docker
      dockerfile: cyber-sandbox.Dockerfile
    container_name: mythos-cyber-sandbox
    restart: unless-stopped
    security_opt:
      - name: gvisor
    read_only: true
    tmpfs:
      - /tmp:size=256M,noexec
    mem_limit: 1g
    cpus: "2.0"
    volumes:
      - ./test_cases:/sandbox/test_cases:ro

volumes:
  postgres_data:
  traefik_data:
