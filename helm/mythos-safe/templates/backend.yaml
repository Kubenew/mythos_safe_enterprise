apiVersion: v1
kind: Service
metadata:
  name: {{ include "mythos-safe.fullname" . }}-backend
  labels:
    {{- include "mythos-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "mythos-safe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mythos-safe.fullname" . }}-backend
  labels:
    {{- include "mythos-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mythos-safe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "mythos-safe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: "{{ include "mythos-safe.fullname" . }}-postgresql"
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mythos-safe.fullname" . }}-postgresql
                  key: password
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database }}
            - name: REDIS_HOST
              value: "{{ include "mythos-safe.fullname" . }}-redis-master"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
