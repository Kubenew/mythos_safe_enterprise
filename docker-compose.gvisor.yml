version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: mythos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]

  redis:
    image: redis:7-alpine
    container_name: mythos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes

  api:
    build: ./backend
    container_name: mythos-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    container_name: mythos-worker
    restart: unless-stopped
    env_file: .env
    command: celery -A app.worker.worker worker --loglevel=info --concurrency=4

  flower:
    build: ./backend
    container_name: mythos-flower
    restart: unless-stopped
    env_file: .env
    ports:
      - "5555:5555"
    command: celery -A app.worker.worker flower --port=5555

  cyber-sandbox:
    build:
      context: ./docker
      dockerfile: cyber-sandbox.Dockerfile
    container_name: mythos-cyber-sandbox
    restart: unless-stopped
    security_opt:
      - name: gvisor
    read_only: true
    tmpfs:
      - /tmp:size=256M,noexec
    mem_limit: 768m
    cpus: "2.0"
    volumes:
      - ./test_cases:/sandbox/test_cases:ro

volumes:
  postgres_data: