version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mythos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mythos_safe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Broker + Result Backend)
  redis:
    image: redis:7-alpine
    container_name: mythos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend (Development with Hot Reload)
  api:
    build: ./backend
    container_name: mythos-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG

  # Celery Worker (Development)
  worker:
    build: ./backend
    container_name: mythos-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.worker.worker worker --loglevel=DEBUG --concurrency=2

  # Flower (Celery Monitoring Dashboard)
  flower:
    build: ./backend
    container_name: mythos-flower
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    ports:
      - "5555:5555"
    command: celery -A app.worker.worker flower --port=5555

  # Secure Cyber Sandbox (with gVisor)
  cyber-sandbox:
    build:
      context: ./docker
      dockerfile: cyber-sandbox.Dockerfile
    container_name: mythos-cyber-sandbox
    restart: unless-stopped
    security_opt:
      - name: gvisor   # Strong isolation
    read_only: true
    tmpfs:
      - /tmp:size=128M
    mem_limit: 512m
    cpus: "1.0"
    volumes:
      - ./test_cases:/sandbox/test_cases:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
