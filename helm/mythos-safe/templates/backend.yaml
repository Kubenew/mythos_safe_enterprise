---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mythos-safe.fullname" . }}-frontend
  labels:
    {{- include "mythos-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "mythos-safe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mythos-safe.fullname" . }}-frontend
  labels:
    {{- include "mythos-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mythos-safe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "mythos-safe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_BASE
              value: "http://{{ include "mythos-safe.fullname" . }}-backend:8000"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
