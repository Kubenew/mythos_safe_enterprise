version: '3.9'

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  worker:
    command: celery -A app.worker.worker worker --loglevel=DEBUG --concurrency=2

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  flower:
    ports:
      - "5555:5555"